<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peloton — porównanie QA</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; background: #25241f; color: #f5efe4; font: 12px/1.2 system-ui, sans-serif; }
      main { display: grid; grid-template-columns: 390px 390px; gap: 12px; width: max-content; padding: 8px; }
      figure { margin: 0; display: grid; gap: 6px; }
      figcaption { font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
      img { width: 390px; height: 844px; display: block; object-fit: fill; background: #f4eddf; }
    </style>
  </head>
  <body>
    <main>
      <figure>
        <figcaption>Referencja</figcaption>
        <img src="/reference-390x844.png" alt="Wybrany projekt" />
      </figure>
      <figure>
        <figcaption>Implementacja</figcaption>
        <img src="/implementation-390x844-qa.png" alt="Zrzut implementacji" />
      </figure>
    </main>
  </body>
</html>
