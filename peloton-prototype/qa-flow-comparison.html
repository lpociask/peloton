<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peloton — flow QA</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; background: #25241f; color: #f5efe4; font: 12px/1.2 system-ui, sans-serif; }
      main { width: max-content; padding: 8px; }
      section { display: grid; grid-template-columns: 390px 390px; gap: 12px; margin-bottom: 18px; }
      figure { margin: 0; display: grid; gap: 6px; }
      figcaption { font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
      img { width: 390px; height: 844px; display: block; object-fit: fill; background: #f4eddf; }
    </style>
  </head>
  <body>
    <main>
      <section aria-label="Spis treści">
        <figure>
          <figcaption>Referencja — spis treści</figcaption>
          <img src="/reference-contents-390x844.png" alt="Referencyjny spis treści" />
        </figure>
        <figure>
          <figcaption>Implementacja — spis treści</figcaption>
          <img src="/implementation-contents-390x844-final.jpg" alt="Zaimplementowany spis treści" />
        </figure>
      </section>
      <section aria-label="Otwarcie artykułu">
        <figure>
          <figcaption>Referencja — otwarcie artykułu</figcaption>
          <img src="/reference-story-390x844.png" alt="Referencyjne otwarcie artykułu" />
        </figure>
        <figure>
          <figcaption>Implementacja — otwarcie artykułu</figcaption>
          <img src="/implementation-story-390x844-final.jpg" alt="Zaimplementowane otwarcie artykułu" />
        </figure>
      </section>
    </main>
  </body>
</html>
