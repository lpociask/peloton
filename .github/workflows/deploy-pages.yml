name: Deploy magazines to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            peloton-prototype/package-lock.json
            vinyl-prototype/package-lock.json

      - name: Install dependencies
        working-directory: peloton-prototype
        run: npm ci

      - name: Install Rowki dependencies
        working-directory: vinyl-prototype
        run: npm ci

      - name: Build
        working-directory: peloton-prototype
        run: npm run build

      - name: Build Rowki
        working-directory: vinyl-prototype
        run: npm run build

      - name: Generate iOS app content feed
        run: node scripts/build-app-feed.mjs

      - name: Add Rowki to the Pages artifact
        run: |
          mkdir -p peloton-prototype/dist/rowki
          cp -R vinyl-prototype/dist/. peloton-prototype/dist/rowki/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: peloton-prototype/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
