name: Build magazine artifact

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: magazine-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            peloton-prototype/package-lock.json
            vinyl-prototype/package-lock.json

      - name: Install dependencies
        working-directory: peloton-prototype
        run: npm ci

      - name: Install Rowki dependencies
        working-directory: vinyl-prototype
        run: npm ci

      - name: Build
        working-directory: peloton-prototype
        run: npm run build

      - name: Build Rowki
        working-directory: vinyl-prototype
        run: npm run build

      - name: Assemble Cloudflare artifact
        run: |
          mkdir -p site-artifact/peloton/rowki
          cp -R peloton-prototype/dist/. site-artifact/peloton/
          cp -R vinyl-prototype/dist/. site-artifact/peloton/rowki/

      - name: Upload Cloudflare-ready artifact
        uses: actions/upload-artifact@v4
        with:
          name: magazines-cloudflare
          path: site-artifact
          if-no-files-found: error
